<!DOCTYPE html>
<html lang="nl">
<head>

    <title>PerfoTec - Portaal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;

            flex-direction: column;
            align-items: center;

        header {

        .menu-grid {

        }

            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 8px;

            font-weight: bold;

            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .menu-btn:hover {
